<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sales Tracker - User Detail</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    .detail-page { display: flex; flex-direction: column; height: 100vh; }
  </style>
</head>
<body>
  <div class="detail-page">
    <div class="detail-header">
      <button class="back-btn" onclick="window.location.href='/dashboard.html'">&larr; Back</button>
      <h2 id="userName">Loading...</h2>
      <span class="user-status status" id="userStatus"></span>
    </div>
    <div class="session-info" id="sessionInfo">Loading session...</div>
    <div class="detail-map" style="position:relative;flex:1;">
      <div id="detail-map" style="width:100%;height:100%;"></div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#1e8e3e;"></div> Check-in</div>
        <div class="legend-item"><div class="legend-dot" style="background:#1a73e8;"></div> Current Location</div>
        <div class="legend-item"><div class="legend-dot" style="background:#d93025;"></div> Check-out</div>
        <div class="legend-item"><div style="width:24px;height:3px;background:#4285f4;border-radius:2px;"></div> Route</div>
      </div>
    </div>
  </div>
  <script src="/js/api.js"></script>
  <script src="/js/map.js"></script>
  <script src="/js/user-detail.js"></script>
</body>
</html>
